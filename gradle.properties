# Project-wide Gradle settings.
org.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=1024m -Dfile.encoding=UTF-8 -Djava.net.preferIPv4Stack=true
android.useAndroidX=true
kotlin.code.style=official
android.nonTransitiveRClass=true

# Re-enabling Kotlin daemon with more memory can often solve the termination issue
kotlin.daemon.enabled=true
kotlin.daemon.jvmargs=-Xmx2048m
